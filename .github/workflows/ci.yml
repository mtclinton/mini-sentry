name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gcc (for static samples)
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        run: make build

      - name: Build samples
        run: make samples

      - name: Run test suite (quick)
        run: make test-quick

      - name: Race detection
        run: go test -race -count=1 ./...
